<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{{TITLE}} — Личная Стратегия</title>
<meta name="description" content="{{DESCRIPTION}}">
<meta property="og:title" content="{{TITLE}}">
<meta property="og:description" content="{{DESCRIPTION}}">
<meta property="og:image" content="{{COVER_URL}}">
<meta property="og:type" content="article">
<meta property="og:site_name" content="Личная Стратегия">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#000;--surface:#0d0d0d;--border:#1a1a1a;--text:#e8e8e8;--muted:#888;--dim:#555;--accent-blue:#1a4fff;--serif:'Lora',Georgia,serif;--sans:'Inter',-apple-system,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden}
html{overflow-x:hidden}
a{color:var(--muted);text-decoration:none;transition:color .2s}
a:hover{color:var(--text)}

.header{padding:20px 0;border-bottom:1px solid var(--border)}
.header-inner{max-width:960px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:flex-end;position:relative}
.logo{font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--text);position:absolute;left:50%;transform:translateX(-50%)}
.back{font-size:13px;color:var(--dim)}
.back:hover{color:var(--text)}

.article{max-width:680px;margin:0 auto;padding:48px 24px 80px}
.article-cat{font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--dim);margin-bottom:12px}
.article-title{font-family:var(--serif);font-size:clamp(28px,4.5vw,40px);font-weight:400;line-height:1.25;margin-bottom:12px;letter-spacing:-0.02em}
.article-sub{font-family:var(--serif);font-style:italic;font-size:18px;color:var(--muted);margin-bottom:12px}
.article-date{font-size:13px;color:var(--dim);margin-bottom:40px}

/* Author */
.author{display:flex;align-items:center;gap:14px;margin-bottom:40px}
.author-photo{width:48px;height:48px;border-radius:50%;object-fit:cover;filter:grayscale(100%)}
.author-info{display:flex;flex-direction:column}
.author-name{font-family:var(--sans);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text)}
.author-date{font-family:var(--sans);font-size:12px;color:var(--dim)}

/* Cover */
.article-cover{width:100%;border-radius:8px;margin-bottom:40px;aspect-ratio:16/9;object-fit:cover;background:var(--surface)}

/* Content */
.article-body{font-family:var(--serif);font-size:19px;line-height:1.75}
.article-body p{margin-bottom:1.4em}
.article-body h2{font-family:var(--sans);font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin:48px 0 16px}
.article-body blockquote{border-left:3px solid var(--accent-blue);padding:4px 0 4px 20px;margin:24px 0;font-style:italic;color:var(--muted)}
.article-body blockquote cite{display:block;margin-top:8px;font-style:normal;font-size:14px;font-family:var(--sans);color:var(--dim)}
.article-body strong{color:#fff}
.article-body a{color:var(--muted);border-bottom:1px dotted var(--dim)}
.article-body a:hover{color:var(--text)}

.insight{border-left:3px solid var(--accent-blue);padding:4px 0 4px 20px;margin:32px 0}
.ins-label{font-family:var(--sans);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent-blue);margin-bottom:6px}
.ins-text{font-family:var(--serif);font-style:italic;font-size:19px;line-height:1.5}

.qblock{border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:28px 0;margin:40px 0}
.q-label{font-family:var(--sans);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--dim);margin-bottom:10px}
.q-text{font-family:var(--serif);font-style:italic;font-size:22px;line-height:1.4}

.muted-text{color:var(--muted);font-size:16px;font-family:var(--serif)}
.divider{border:none;border-top:1px solid var(--border);margin:24px 0}

.video-embed{position:relative;margin:32px 0;border-radius:8px;overflow:hidden}
.video-embed iframe{width:100%;aspect-ratio:16/9;border:0}

/* Share */
.share-bar{display:flex;align-items:center;gap:12px;margin:40px 0;padding:16px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.share-label{font-family:var(--sans);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--dim)}
.share-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--muted);font-family:var(--sans);cursor:pointer;background:transparent;transition:all .2s;text-decoration:none}
.share-btn:hover{border-color:var(--dim);color:var(--text);text-decoration:none}
.share-btn svg{width:14px;height:14px}

/* Subscribe CTA */
.subscribe-cta{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;text-align:center;margin-top:40px}
.subscribe-cta h3{font-family:var(--serif);font-size:20px;font-weight:400;margin-bottom:8px}
.subscribe-cta p{font-size:14px;color:var(--muted);margin-bottom:20px}
.subscribe-form{display:flex;gap:8px;max-width:400px;margin:0 auto}
.subscribe-form input{flex:1;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:14px;color:var(--text);font-family:var(--sans);outline:none}
.subscribe-form input:focus{border-color:var(--dim)}
.subscribe-form input::placeholder{color:var(--dim)}
.subscribe-form button{padding:12px 24px;background:#fff;color:#000;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans)}

.footer{max-width:680px;margin:0 auto;padding:24px;text-align:center;font-size:12px;color:var(--dim);border-top:1px solid var(--border)}
.footer a{color:var(--dim);margin:0 8px}
.footer a:hover{color:var(--text)}

@media(max-width:640px){
  .article{padding:32px 16px 60px}
  .article-body{font-size:17px}
  .subscribe-form{flex-direction:column}
  .share-bar{flex-wrap:wrap}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="/" class="logo">ЛИЧНАЯ СТРАТЕГИЯ</a>
    <a href="/" class="back">&larr; Выпуски</a>
  </div>
</header>

<article class="article">
  <div class="article-cat">{{CATEGORY}}</div>
  <h1 class="article-title">{{TITLE}}</h1>
  <p class="article-sub">{{SUBTITLE}}</p>

  <div class="author">
    <img class="author-photo" src="/assets/img/author.jpg" alt="Денис Царюк">
    <div class="author-info">
      <span class="author-name">Денис Царюк</span>
      <span class="author-date">{{DATE}}</span>
    </div>
  </div>

  {{COVER_IMG}}

  <div class="article-body">
    {{BODY_HTML}}
  </div>

  <div class="share-bar">
    <span class="share-label">Поделиться</span>
    <a class="share-btn" href="https://t.me/share/url?url=https://letters.tsaryuk.ru/articles/{{SLUG}}.html&text={{TITLE}}" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/></svg>
      Telegram
    </a>
    <a class="share-btn" href="#" onclick="navigator.clipboard.writeText(window.location.href);this.innerHTML='Скопировано!';setTimeout(()=>this.innerHTML='<svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;><rect x=&quot;9&quot; y=&quot;9&quot; width=&quot;13&quot; height=&quot;13&quot; rx=&quot;2&quot;/><path d=&quot;M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1&quot;/></svg> Скопировать ссылку',2000);return false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      Скопировать ссылку
    </a>
  </div>

  <div class="subscribe-cta">
    <h3>Это письмо из рассылки</h3>
    <p>Каждую неделю одно честное письмо. Подпишитесь, чтобы не пропустить.</p>
    <form class="subscribe-form" id="subscribeForm">
      <input type="email" placeholder="Ваш email" required id="emailInput">
      <button type="submit">Подписаться</button>
    </form>
  </div>
</article>

<footer class="footer">
  <a href="https://tsaryuk.ru">Сайт автора</a>
  <a href="https://t.me/tsaryuk_ru">Telegram</a>
  <a href="https://youtube.com/@tsaryuk">YouTube</a>
  <div style="margin-top:8px">&copy; Денис Царюк, 2026</div>
</footer>

<script>
document.getElementById('subscribeForm').addEventListener('submit',async e=>{
  e.preventDefault();const btn=e.target.querySelector('button'),inp=document.getElementById('emailInput');
  btn.disabled=true;btn.textContent='...';
  try{
    await fetch('/api/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:inp.value})});
    btn.textContent='Готово!';
  }catch{btn.textContent='Ошибка';btn.disabled=false}
});
</script>

</body>
</html>
