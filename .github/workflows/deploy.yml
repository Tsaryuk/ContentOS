name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          curl -s -X POST http://178.128.197.227:9000/deploy \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$(echo -n '{}' | openssl dgst -sha256 -hmac 'contentos-deploy-2026' | awk '{print $2}')" \
            -d '{}' \
            --max-time 180 \
            -w "\nHTTP Status: %{http_code}\n"
